services:
  - type: web
    name: veda-ai-oracle
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && gunicorn chatbot:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.14
      - key: GROQ_API_KEY
        sync: false
