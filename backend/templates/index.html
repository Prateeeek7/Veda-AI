<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeetaAI - Cosmic Guidance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Fonts: Cinzel for elegant headings, Outfit for clean text, Yatra One for Sanskrit vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Outfit:wght@300;400;500&family=Yatra+One&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #03050a;
            --bg-mid: #0a1122;
            --gold-primary: #D4AF37;
            --gold-glow: rgba(212, 175, 55, 0.5);
            --saffron: #FF9933;
            --text-main: #E2E8F0;
            --text-muted: #94A3B8;
            --glass-bg: rgba(16, 22, 40, 0.45);
            --glass-border: rgba(212, 175, 55, 0.15);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Ambient Cosmic Background */
        .cosmic-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 30%, var(--bg-mid) 0%, var(--bg-deep) 100%);
            z-index: -3;
        }

        /* Mandala Watermark overlay */
        .mandala-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 800px; height: 800px;
            background-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="50" r="48" fill="none" stroke="%23D4AF37" stroke-width="0.2" opacity="0.1"/><path d="M50 2 L50 98 M2 50 L98 50 M16 16 L84 84 M16 84 L84 16" stroke="%23D4AF37" stroke-width="0.1" opacity="0.1"/></svg>');
            background-size: cover;
            opacity: 0.15;
            z-index: -2;
            pointer-events: none;
            animation: slowRotate 120s linear infinite;
        }

        /* Floating Cosmic Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.3;
            animation: floatOrb 20s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--gold-primary); top: -100px; left: -100px; }
        .orb-2 { width: 300px; height: 300px; background: #2a4365; bottom: -50px; right: -50px; animation-delay: -5s; }
        .orb-3 { width: 200px; height: 200px; background: var(--saffron); top: 50%; left: 60%; opacity: 0.1; animation-delay: -10s; }

        @keyframes slowRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0); }
            100% { transform: translate(60px, 40px); }
        }

        /* Header / Top Om Centerpiece */
        .header {
            text-align: center;
            padding: 2rem 0 1rem 0;
            flex-shrink: 0;
            position: relative;
        }
        .om-symbol {
            font-family: 'Yatra One', serif;
            font-size: 3.5rem;
            color: var(--gold-primary);
            text-shadow: 0 0 25px var(--gold-glow);
            margin: 0;
            line-height: 1;
            animation: breathe 4s infinite alternate ease-in-out;
        }
        .app-title {
            font-family: 'Cinzel', serif;
            letter-spacing: 4px;
            font-size: 0.9rem;
            color: var(--gold-primary);
            opacity: 0.8;
            margin-top: 0.5rem;
            text-transform: uppercase;
        }

        @keyframes breathe {
            form { text-shadow: 0 0 15px var(--gold-glow), 0 0 5px var(--gold-primary); transform: scale(0.98); }
            to { text-shadow: 0 0 40px var(--gold-glow), 0 0 15px var(--gold-primary); transform: scale(1.02); }
        }

        /* Chat Layout */
        .chat-container {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            padding: 1rem 10vw;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }
        .chat-container::-webkit-scrollbar { width: 6px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(212, 175, 55, 0.2); border-radius: 10px; }

        /* Glassmorphism Messages */
        .message {
            max-width: 80%;
            padding: 1.5rem;
            border-radius: 16px;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 1rem;
            transform: translateY(10px);
            opacity: 0;
            animation: floatUp 0.5s forwards ease-out;
            position: relative;
        }

        @keyframes floatUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .bot { 
            align-self: flex-start; 
            border-left: 3px solid var(--gold-primary);
            border-top-left-radius: 4px;
        }
        
        .user { 
            align-self: flex-end; 
            background: rgba(42, 67, 101, 0.3);
            border: 1px solid rgba(144, 205, 244, 0.15);
            border-right: 3px solid #63b3ed;
            border-top-right-radius: 4px;
        }

        .text {
            font-size: 1.05rem;
            line-height: 1.7;
            white-space: pre-wrap;
            font-weight: 300;
        }

        /* Sources Accordion - Elegant styling */
        .sources {
            margin-top: 0.5rem;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 8px;
            padding: 1rem;
            font-size: 0.95rem;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .sources summary {
            cursor: pointer;
            color: var(--gold-primary);
            font-family: 'Cinzel', serif;
            font-size: 0.95rem;
            letter-spacing: 1px;
            font-weight: 600;
            outline: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .source-item {
            margin-top: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .source-item:last-child { border-bottom: none; padding-bottom: 0; }
        .source-meta { 
            color: var(--saffron); 
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }
        .source-sanskrit { 
            font-family: 'Yatra One', serif; 
            color: var(--text-main); 
            font-size: 1.15rem; 
            margin: 0.8rem 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.1);
            letter-spacing: 1px;
            text-align: center;
        }
        .source-translation {
            color: var(--text-muted);
            font-style: italic;
            text-align: center;
        }

        /* Input Area */
        .input-area {
            padding: 2rem 10vw;
            background: linear-gradient(to top, var(--bg-deep) 40%, transparent);
            position: relative;
        }

        .input-box {
            display: flex;
            gap: 1rem;
            background: rgba(16, 22, 40, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 0.5rem 1rem 0.5rem 2rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 0 10px rgba(212, 175, 55, 0.05);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .input-box:focus-within {
            border-color: rgba(212, 175, 55, 0.5);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6), 0 0 20px rgba(212, 175, 55, 0.15);
        }

        textarea {
            flex-grow: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            resize: none;
            outline: none;
            font-family: 'Outfit', sans-serif;
            padding-top: 14px;
            height: 24px;
            max-height: 150px;
            overflow-y: hidden;
            font-weight: 300;
        }
        textarea::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
            font-family: 'Cinzel', serif;
            letter-spacing: 1px;
        }

        .buttons-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .send-btn, .mic-btn {
            background: transparent;
            border: none;
            cursor: pointer;
            width: 44px; height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            position: relative;
        }

        .mic-btn {
            color: var(--gold-primary);
        }
        .mic-btn::after {
            content: ''; position: absolute; inset: 0; border-radius: 50%; border: 1px solid var(--gold-primary); opacity: 0;
            transition: all 0.3s;
        }
        .mic-btn:hover::after {
            animation: ripple 1.5s infinite;
        }

        .send-btn {
            background: var(--gold-primary);
            color: var(--bg-deep);
        }
        .send-btn:hover {
            box-shadow: 0 0 15px var(--gold-glow);
            transform: scale(1.05);
        }
        .send-btn svg, .mic-btn svg { width: 20px; height: 20px; fill: currentColor; }

        @keyframes ripple {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 1rem;
            align-items: center;
            color: var(--gold-primary);
            font-family: 'Cinzel', serif;
            letter-spacing: 2px;
            animation: pulseText 2s infinite;
        }
        
        @keyframes pulseText {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; text-shadow: 0 0 10px var(--gold-glow); }
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .chat-container { padding: 1rem 1rem; }
            .input-area { padding: 1rem; }
            .message { max-width: 95%; }
            .om-symbol { font-size: 2.5rem; }
        }

    </style>
</head>
<body>

    <!-- Ambient Background Elements -->
    <div class="cosmic-bg"></div>
    <div class="mandala-overlay"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="header">
        <div class="om-symbol">ॐ</div>
        <div class="app-title">Geeta AI</div>
    </div>

    <div class="chat-container" id="chat">
        <!-- Initial Message -->
        <div class="message bot">
            <div class="text">Namaste. I am GeetaAI, grounded in the cosmic wisdom of the 700 verses of the Bhagavad Gita. Seek your answers, and I shall unveil the sacred truths exclusively from the texts.</div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="msgInput" placeholder="Seek guidance..." rows="1" oninput="this.style.height = '';this.style.height = Math.min(this.scrollHeight, 150) + 'px'"></textarea>
            <div class="buttons-row">
                <button class="mic-btn" onclick="alert('Voice search connection point. Connect Web Speech API here if needed.')" title="Voice Input">
                    <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.39-.9.88 0 2.76-2.24 5-5 5s-5-2.24-5-5c0-.49-.41-.88-.9-.88s-.89.39-.89.88c0 3.19 2.58 5.79 5.77 6.16V20h-2c-.55 0-1 .45-1 1s.45 1 1 1h6c.55 0 1-.45 1-1s-.45-1-1-1h-2v-1.96c3.19-.37 5.77-2.97 5.77-6.16 0-.49-.4-.88-.89-.88z"/></svg>
                </button>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send">
                    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatInput = document.getElementById('msgInput');
        const chatBox = document.getElementById('chat');

        chatInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function formatText(text) {
            // Converts bold and newlines mildly for better reading
            return text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
        }

        function appendMessage(role, text, sources = []) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            
            let html = `<div class="text">${formatText(text)}</div>`;

            if (sources && sources.length > 0) {
                let sourceHtml = `
                    <details class="sources">
                        <summary>
                            <svg style="width:16px;height:16px;fill:currentColor;" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            Sacred Sources (${sources.length})
                        </summary>`;
                sources.forEach(s => {
                    // Combine transliteration and translation beautifully
                    sourceHtml += `
                        <div class="source-item">
                            <div class="source-meta">❖ BG ${s.chapter}.${s.verse} | ${s.chapter_name}</div>
                            <div class="source-sanskrit">${s.sanskrit.replace(/\|/g, '<br>|')}</div>
                            <div class="source-translation">"${s.translation}"</div>
                        </div>
                    `;
                });
                sourceHtml += `</details>`;
                html += sourceHtml;
            }

            msgDiv.innerHTML = html;
            chatBox.appendChild(msgDiv);
            
            // Smooth scroll to bottom
            setTimeout(() => {
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 100);
            return msgDiv;
        }

        async function sendMessage() {
            const msg = chatInput.value.trim();
            if(!msg) return;

            // Add user message
            appendMessage('user', msg);
            chatInput.value = '';
            chatInput.style.height = '24px';
            
            // Add loading indicator
            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message bot';
            loadingMsg.innerHTML = `<div class="typing-indicator">Awakening wisdom...</div>`;
            chatBox.appendChild(loadingMsg);
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: msg})
                });
                
                const data = await response.json();
                
                // Replace loading message with actual response
                chatBox.removeChild(loadingMsg);
                appendMessage('bot', data.reply, data.sources);

            } catch(e) {
                chatBox.removeChild(loadingMsg);
                appendMessage('bot', "A disturbance in the cosmic connection occurred. Please try again.");
            }
        }
    </script>
</body>
</html>
